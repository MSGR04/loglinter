name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -v ./pkg/...

      - name: Build
        run: go build ./...

      - name: Install loglinter
        run: go install ./cmd/loglinter

      - name: Test examples (linting only)
        run: |
          echo "Testing examples..."
          # Проверяем, что линтер работает на примерах
          loglinter examples/01_basic/check_rules.go || echo "Expected errors found"
          loglinter examples/02_config/config_test.go || echo "Expected errors found"
          loglinter examples/03_custom_patterns/custom_patterns.go || echo "Expected errors found"
          loglinter examples/04_regex_patterns/regex_patterns.go || echo "Expected errors found"